<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b0c1a">
    <title>Order Details - Mega Bundle</title>

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts — non-blocking -->
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap">
    </noscript>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        ENTER YOUR DETAILS
    </header>

    <div class="glass-container">
        <div class="order-summary" id="order-summary">
            <!-- Injected by JS -->
            <p>Loading order details...</p>
        </div>

        <form id="details-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="whatsapp">WhatsApp Number</label>
                <input type="tel" id="whatsapp" required placeholder="9876543210" pattern="[0-9]{10}">
                <small style="color: var(--text-light); font-size: 0.85rem; margin-top: 5px; display:block;">Enter 10
                    digit number without country code</small>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="john@example.com">
            </div>

            <button type="submit" class="submit-btn" id="next-btn">
                PROCEED TO PAY ➔
            </button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 Video Bundle Shop. All rights reserved.</p>
    </footer>

    <script src="details.js" defer></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>

</html>
